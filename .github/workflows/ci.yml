name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-skills:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.25'

      - name: Check skill sync
        run: make check-skills

      - name: Check generated skill rules are up-to-date
        run: make check-generated-skill

      - name: Check OAuth release contract
        run: ./scripts/check-oauth-release-contract.sh

      - name: Check Homebrew formula test
        run: ./scripts/check-homebrew-formula-test.sh

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check-skills
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.25'

      - name: Verify gofmt
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "The following files need gofmt:" >&2
            echo "$files" >&2
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: latest
          args: --timeout 5m

      - name: Run tests
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build CLI
        run: make build
        env:
          BKT_OAUTH_CLIENT_ID: ci-oauth-client-id
          BKT_OAUTH_CLIENT_SECRET: ci-oauth-client-secret # gitleaks:allow

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          output-file: sbom.cdx.json
          format: cyclonedx-json

  scorecard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ !github.event.repository.private }}
    permissions:
      id-token: write
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: results.sarif
