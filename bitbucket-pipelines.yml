image: golang:1.24

definitions:
  steps:
    - step: &build
        name: Build
        caches:
          - go-mod
        script:
          - go build -v ./...
    - step: &test
        name: Test
        caches:
          - go-mod
        script:
          - go test ./...
    - step: &lint
        name: Lint
        caches:
          - go-mod
        script:
          - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          - golangci-lint run --timeout 5m
  caches:
    go-mod:
      key:
        files:
          - go.sum
      path: /go/pkg/mod

pipelines:
  default:
    - parallel:
        - step: *build
        - step: *test

  branches:
    master:
      - parallel:
          - step: *build
          - step: *test
          - step: *lint

  pull-requests:
    '**':
      - parallel:
          - step: *build
          - step: *test
          - step: *lint

  custom:
    smoke-install:
      - step:
          name: Smoke test README install snippet
          image: alpine:3.21
          script:
            - apk add --no-cache curl
            - curl -sL https://github.com/avivsinai/bitbucket-cli/releases/download/v0.16.4/bkt_0.16.4_linux_x86_64.tar.gz | tar xz -C /tmp && install /tmp/bkt /usr/local/bin/
            - bkt --version
            - bkt --help
